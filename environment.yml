name: mamba
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy
  - pillow
  - scipy=1.11.3
  - matplotlib=3.8.0
  - tqdm=4.66.1
  - pytorch
  - torchvision
  - pytorch-cuda=12.1
  - pip:
      - opencv-python==4.8.1.78
      - imageio==2.31.4
      - scikit-image==0.21.0
      - sewar==0.4.4
      - einops==0.7.0
      - dominate==2.9.1
      - mmengine==0.10.2
      - packaging
      - pystrum
      # Install this for the paper model if your CUDA/PyTorch stack supports it:
      # - mamba-ssm
